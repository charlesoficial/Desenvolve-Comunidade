default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  url: <%= ENV["DATABASE_URL"] %>
  # Pooler do Supabase (PgBouncer Transaction mode) nao suporta prepared statements.
  prepared_statements: false
  advisory_locks: false

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
